server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /upload {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        client_max_body_size 50m;
    }

    location /ask {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
    }
}
